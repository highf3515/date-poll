<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>날짜 조율 - 로그인</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card">
    <h1 style="margin-bottom:1rem;">📅 날짜 조율</h1>
    <h2 style="font-size:18px; font-weight:500; margin-bottom:1rem;">로그인 / 회원가입</h2>
    <label>이메일</label>
    <input type="text" id="auth-email" placeholder="email@example.com">
    <label>비밀번호</label>
    <input type="password" id="auth-password" placeholder="6자 이상">
    <button class="btn" onclick="signUp()" style="margin-bottom:8px;">회원가입</button>
    <button class="btn" onclick="signIn()" style="background:#6C756B;">로그인</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase.js"></script>
  <script>
    async function signUp() {
      const email = document.getElementById('auth-email').value.trim();
      const password = document.getElementById('auth-password').value;
      if (!email || !password) { alert('이메일과 비밀번호를 입력해줘!'); return; }
      const { error } = await db.auth.signUp({ email, password });
      if (error) { alert('오류: ' + error.message); return; }
      alert('가입 완료! 로그인 해줘');
    }

    async function signIn() {
      const email = document.getElementById('auth-email').value.trim();
      const password = document.getElementById('auth-password').value;
      if (!email || !password) { alert('이메일과 비밀번호를 입력해줘!'); return; }
      const { error } = await db.auth.signInWithPassword({ email, password });
      if (error) { alert('오류: ' + error.message); return; }
      location.href = 'groups.html';
    }

    (async () => {
      const { data } = await db.auth.getSession();
      if (data.session) location.href = 'groups.html';
    })();
  </script>
</body>
</html>
