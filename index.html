  <script>
    const SUPABASE_URL = 'https://jxqojqsyanhgkyjquhxn.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_DZ6i9IlsmMsCiFuyHxPO4w_akeZBoQi';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    async function test() {
