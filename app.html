<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>날짜 조율</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card" id="group-info"></div>

  <h1>📅 날짜 조율</h1>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('poll')">📋 날짜 투표</button>
    <button class="tab" onclick="switchTab('avail')">🗓️ 가능한 날짜</button>
  </div>

  <!-- 탭 1: 날짜 투표 -->
  <div class="section active" id="tab-poll">
    <div class="card">
      <div class="cal-header">
        <button class="cal-nav" id="prev">&#8592;</button>
        <span class="cal-month" id="month-label"></span>
        <button class="cal-nav" id="next">&#8594;</button>
      </div>
      <div class="cal-grid" id="cal-dow">
        <div class="cal-dow">일</div><div class="cal-dow">월</div><div class="cal-dow">화</div>
        <div class="cal-dow">수</div><div class="cal-dow">목</div><div class="cal-dow">금</div><div class="cal-dow">토</div>
      </div>
      <div class="cal-grid" id="cal-days"></div>
      <div id="selected-wrap" style="display:none; margin-top:0.75rem;">
        <div style="font-size:13px; color:#93ACB5; margin-bottom:6px;">선택된 날짜</div>
        <div class="selected-tags" id="tags"></div>
      </div>
      <div id="poll-date-info" class="info-panel empty">날짜를 클릭하면 해당 날짜의 약속/투표 현황이 여기 표시돼요</div>
    </div>
    <div class="card">
      <label for="title-input">약속 제목</label>
      <input type="text" id="title-input" placeholder="예: 1월 회식">
      <p class="hint" id="hint">날짜를 먼저 선택해주세요</p>
      <button class="btn" id="create-btn" disabled>약속 만들기</button>
    </div>
  </div>

  <!-- 탭 2: 가능한 날짜 -->
  <div class="section" id="tab-avail">
    <div class="card">
      <div class="cal-header">
        <button class="cal-nav" id="avail-prev">&#8592;</button>
        <span class="cal-month" id="avail-month-label"></span>
        <button class="cal-nav" id="avail-next">&#8594;</button>
      </div>
      <div class="cal-grid" id="avail-cal-dow">
        <div class="cal-dow">일</div><div class="cal-dow">월</div><div class="cal-dow">화</div>
        <div class="cal-dow">수</div><div class="cal-dow">목</div><div class="cal-dow">금</div><div class="cal-dow">토</div>
      </div>
      <div class="cal-grid" id="avail-cal-days"></div>
      <div id="avail-selected-wrap" style="display:none; margin-top:0.75rem;">
        <div style="font-size:13px; color:#93ACB5; margin-bottom:6px;">선택된 날짜</div>
        <div class="selected-tags" id="avail-tags"></div>
      </div>
      <button class="btn" style="margin-top:1rem;" onclick="submitAvail()">저장하기</button>
      <button class="btn" style="margin-top:8px; background:#6C756B;" onclick="deleteSelectedAvail()">선택한 날짜 내 데이터 삭제</button>
      <div id="avail-date-info" class="info-panel empty">날짜를 클릭하면 그날 가능한 사람 목록이 여기 표시돼요</div>
    </div>
  </div>

  <button class="small-btn" style="margin-top:1rem;" onclick="location.href='groups.html'">← 그룹 목록으로</button>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase.js"></script>
  <script>
    let currentUser = null;
    let currentGroup = null;

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      event.target.classList.add('active');
    }

    function fmt(y, m, d) { return y + '-' + String(m + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0'); }
    function fmtDisplay(str) { const [y, m, d] = str.split('-'); return y + '년 ' + Number(m) + '월 ' + Number(d) + '일'; }

    // ── 탭1: 날짜 투표 ──
    const selected = new Set();
    let cur = new Date();
    let allPolls = [], allPollDates = [], allVotes = [];
    let activePollDate = null;

    function render() {
      const y = cur.getFullYear(), m = cur.getMonth();
      document.getElementById('month-label').textContent = y + '년 ' + (m + 1) + '월';
      const grid = document.getElementById('cal-days');
      grid.innerHTML = '';
      const first = new Date(y, m, 1).getDay();
      const days = new Date(y, m + 1, 0).getDate();
      const today = new Date();
      for (let i = 0; i < first; i++) {
        const d = document.createElement('div'); d.className = 'cal-day empty'; grid.appendChild(d);
      }
      for (let d = 1; d <= days; d++) {
        const key = fmt(y, m, d);
        const el = document.createElement('div');
        el.className = 'cal-day' + (selected.has(key) ? ' selected' : '');
        if (today.getFullYear() === y && today.getMonth() === m && today.getDate() === d) el.classList.add('today');
        el.textContent = d;
        if (allPollDates.some(pd => pd.date === key)) {
          const dot = document.createElement('div');
          dot.className = 'cal-dot';
          el.appendChild(dot);
        }
        el.onclick = () => { toggle(key); showPollDateInfo(key); };
        grid.appendChild(el);
      }
      renderTags();
    }

    function toggle(key) {
      if (selected.has(key)) { selected.clear(); }
      else { selected.clear(); selected.add(key); }
      render(); updateBtn();
    }

    function renderTags() {
      const wrap = document.getElementById('selected-wrap');
      const tags = document.getElementById('tags');
      const sorted = [...selected].sort();
      if (sorted.length === 0) { wrap.style.display = 'none'; return; }
      wrap.style.display = 'block';
      tags.innerHTML = '';
      sorted.forEach(k => {
        const t = document.createElement('div');
        t.className = 'tag';
        t.innerHTML = fmtDisplay(k) + '<span class="tag-x" data-k="' + k + '">×</span>';
        t.querySelector('.tag-x').onclick = e => { selected.delete(e.target.dataset.k); render(); updateBtn(); };
        tags.appendChild(t);
      });
    }

    function updateBtn() {
      const has = selected.size > 0;
      document.getElementById('create-btn').disabled = !has;
      document.getElementById('hint').textContent = has
        ? selected.size + '개 날짜 선택됨 — 제목을 입력하고 만들기를 눌러주세요'
        : '날짜를 먼저 선택해주세요';
    }

    async function createPoll() {
  const title = document.getElementById('title-input').value.trim();
  if (!title) { document.getElementById('title-input').focus(); return; }
  const { data: poll, error } = await db.from('polls').insert({ title, group_id: currentGroup.id, created_by: currentUser.id }).select().single();
  if (error) { alert('오류: ' + error.message); return; }
  const dateRows = [...selected].sort().map(date => ({ poll_id: poll.id, date }));
  const { data: insertedDates, error: dateError } = await db.from('poll_dates').insert(dateRows).select();
  if (dateError) { alert('날짜 오류: ' + dateError.message); return; }

  const voteRows = insertedDates.map(d => ({
    poll_id: poll.id, user_name: currentGroup.displayName, date_id: d.id, available: true
  }));
  await db.from('votes').insert(voteRows);

  alert('약속이 만들어졌어요! 🎉');
  selected.clear();
  document.getElementById('title-input').value = '';
  await loadPollData();
  render(); updateBtn();
}

   let groupMembers = [];

async function loadPollData() {
  const { data: polls } = await db.from('polls').select('*').eq('group_id', currentGroup.id);
  allPolls = polls || [];
  const pollIds = allPolls.map(p => p.id);
  if (pollIds.length === 0) { allPollDates = []; allVotes = []; }
  else {
    const { data: dates } = await db.from('poll_dates').select('*').in('poll_id', pollIds);
    const { data: votes } = await db.from('votes').select('*').in('poll_id', pollIds);
    allPollDates = dates || [];
    allVotes = votes || [];
  }
  const { data: members } = await db.from('group_members').select('*').eq('group_id', currentGroup.id);
  groupMembers = members || [];
}
    function getMemberName(userId) {
  const member = groupMembers.find(m => m.user_id === userId);
  return member ? member.display_name : '알 수 없음';
}

    function showPollDateInfo(key) {
      activePollDate = key;
      const panel = document.getElementById('poll-date-info');
      const matches = allPollDates.filter(pd => pd.date === key);
      if (matches.length === 0) {
        panel.className = 'info-panel empty';
        panel.innerHTML = fmtDisplay(key) + ' — 이 날짜에 등록된 약속이 없어요';
        return;
      }
      panel.className = 'info-panel';
      panel.innerHTML = '<div style="font-weight:500; margin-bottom:8px;">' + fmtDisplay(key) + '</div>' +
        matches.map(pd => {
          const poll = allPolls.find(p => p.id === pd.poll_id);
          const votesForDate = allVotes.filter(v => v.date_id === pd.id && v.available);
          const names = votesForDate.map(v => v.user_name).join(', ') || '아직 없음';
          return `<div class="info-item">
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <div>
  <strong>${poll ? poll.title : '(삭제됨)'}</strong>
  <span style="font-size:11px; color:#93ACB5; margin-left:6px;">by ${poll ? getMemberName(poll.created_by) : '?'}</span>
</div>
              <button class="small-btn" onclick="deletePollDate(${pd.poll_id}, ${pd.id})">이 날짜 삭제</button>
            </div>
            <div style="font-size:13px; color:#93ACB5; margin-top:4px;">👍 ${votesForDate.length}명 가능 — ${names}</div>
            <div style="margin-top:8px;">
              <button class="small-btn" style="color:#96C5F7; border-color:#96C5F7;" onclick="quickVote(${pd.poll_id}, ${pd.id})">${currentGroup.displayName}로 가능 투표</button>
            </div>
          </div>`;
        }).join('');
    }

    async function quickVote(pollId, dateId) {
  const name = currentGroup.displayName;
  const already = allVotes.some(v => v.date_id === dateId && v.user_name === name && v.available);
  if (already) { alert('이미 투표했어요!'); return; }
  const { error } = await db.from('votes').insert({ poll_id: pollId, user_name: name, date_id: dateId, available: true });
  if (error) { alert('오류: ' + error.message); return; }
  await loadPollData();
  render();
  showPollDateInfo(activePollDate);
}

    async function deletePollDate(pollId, pollDateId) {
  const poll = allPolls.find(p => p.id === pollId);
  if (poll.created_by !== currentUser.id) { alert('약속을 만든 사람만 삭제할 수 있어요!'); return; }
  if (!confirm('이 날짜를 삭제할까요? 이 날짜의 투표도 같이 삭제돼요.')) return;
  await db.from('votes').delete().eq('date_id', pollDateId);
  await db.from('poll_dates').delete().eq('id', pollDateId);
  const { data: remaining } = await db.from('poll_dates').select('id').eq('poll_id', pollId);
  if (!remaining || remaining.length === 0) {
    await db.from('polls').delete().eq('id', pollId);
  }
  await loadPollData();
  render();
  showPollDateInfo(activePollDate);
}

    // ── 탭2: 가능한 날짜 ──
    const availSelected = new Set();
    let availCur = new Date();
    let allAvailability = [];
    let activeAvailDate = null;

    function renderAvail() {
      const y = availCur.getFullYear(), m = availCur.getMonth();
      document.getElementById('avail-month-label').textContent = y + '년 ' + (m + 1) + '월';
      const grid = document.getElementById('avail-cal-days');
      grid.innerHTML = '';
      const first = new Date(y, m, 1).getDay();
      const days = new Date(y, m + 1, 0).getDate();
      for (let i = 0; i < first; i++) {
        const d = document.createElement('div'); d.className = 'cal-day empty'; grid.appendChild(d);
      }
      for (let d = 1; d <= days; d++) {
        const key = fmt(y, m, d);
        const el = document.createElement('div');
        el.className = 'cal-day' + (availSelected.has(key) ? ' selected' : '');
        el.textContent = d;
        const namesForDay = allAvailability.filter(a => a.date === key).map(a => a.user_name);
        if (namesForDay.length > 0) {
          const nameTag = document.createElement('div');
          nameTag.style.cssText = 'font-size:9px; color:#96C5F7; margin-top:2px; line-height:1.2; max-height:24px; overflow:hidden; position:absolute; bottom:2px;';
          nameTag.textContent = namesForDay.join(',');
          el.appendChild(nameTag);
        }
        el.onclick = () => {
          if (availSelected.has(key)) availSelected.delete(key); else availSelected.add(key);
          renderAvail(); renderAvailTags(); showAvailDateInfo(key);
        };
        grid.appendChild(el);
      }
    }

    function renderAvailTags() {
      const wrap = document.getElementById('avail-selected-wrap');
      const tags = document.getElementById('avail-tags');
      const sorted = [...availSelected].sort();
      if (sorted.length === 0) { wrap.style.display = 'none'; return; }
      wrap.style.display = 'block';
      tags.innerHTML = '';
      sorted.forEach(k => {
        const t = document.createElement('div');
        t.className = 'tag';
        t.innerHTML = fmtDisplay(k) + '<span class="tag-x" data-k="' + k + '">×</span>';
        t.querySelector('.tag-x').onclick = e => { availSelected.delete(e.target.dataset.k); renderAvail(); renderAvailTags(); };
        tags.appendChild(t);
      });
    }

    async function loadAvailData() {
      const { data, error } = await db.from('availability').select('*').eq('group_id', currentGroup.id);
      if (error) { console.error(error); return; }
      allAvailability = data || [];
    }

    function showAvailDateInfo(key) {
      activeAvailDate = key;
      const panel = document.getElementById('avail-date-info');
      const matches = allAvailability.filter(a => a.date === key);
      if (matches.length === 0) {
        panel.className = 'info-panel empty';
        panel.innerHTML = fmtDisplay(key) + ' — 아직 가능하다고 한 사람이 없어요';
        return;
      }
      panel.className = 'info-panel';
      panel.innerHTML = '<div style="font-weight:500; margin-bottom:8px;">' + fmtDisplay(key) + ' — ' + matches.length + '명 가능</div>' +
        matches.map(a => `<div class="info-item">
          <span>${a.user_name}</span>
        </div>`).join('');
    }

    async function deleteAvail(id) {
      if (!confirm('이 데이터를 삭제할까요?')) return;
      await db.from('availability').delete().eq('id', id);
      await loadAvailData();
      availSelected.clear();
      renderAvail();
      renderAvailTags();
      if (activeAvailDate) showAvailDateInfo(activeAvailDate);
    }

    async function submitAvail() {
      const name = currentGroup.displayName;
      if (availSelected.size === 0) { alert('날짜를 선택해줘!'); return; }
      const rows = [...availSelected].sort().map(date => ({ user_name: name, date: date, group_id: currentGroup.id }));
      const { error } = await db.from('availability').upsert(rows, { onConflict: 'user_name,date,group_id' });
      if (error) { alert('오류: ' + error.message); return; }
      alert('저장됐어! 🎉');
      availSelected.clear();
      await loadAvailData();
      renderAvail(); renderAvailTags();
      if (activeAvailDate) showAvailDateInfo(activeAvailDate);
    }
    async function deleteSelectedAvail() {
  const name = currentGroup.displayName;
  if (availSelected.size === 0) { alert('날짜를 선택해줘!'); return; }
  if (!confirm('선택한 날짜 중 내 데이터를 삭제할까요?')) return;

  const dates = [...availSelected];
  const { error } = await db.from('availability')
    .delete()
    .eq('user_name', name)
    .eq('group_id', currentGroup.id)
    .in('date', dates);

  if (error) { alert('오류: ' + error.message); return; }

  availSelected.clear();
  await loadAvailData();
  renderAvail(); renderAvailTags();
  if (activeAvailDate) showAvailDateInfo(activeAvailDate);
  alert('삭제 완료!');
}

    document.getElementById('prev').onclick = () => { cur = new Date(cur.getFullYear(), cur.getMonth() - 1, 1); render(); };
    document.getElementById('next').onclick = () => { cur = new Date(cur.getFullYear(), cur.getMonth() + 1, 1); render(); };
    document.getElementById('create-btn').onclick = createPoll;
    document.getElementById('avail-prev').onclick = () => { availCur = new Date(availCur.getFullYear(), availCur.getMonth() - 1, 1); renderAvail(); };
    document.getElementById('avail-next').onclick = () => { availCur = new Date(availCur.getFullYear(), availCur.getMonth() + 1, 1); renderAvail(); };

    // ── 초기 진입 ──
    (async () => {
      currentUser = await requireAuth();
      if (!currentUser) return;
      currentGroup = getCurrentGroup();
      if (!currentGroup) { location.href = 'groups.html'; return; }

      document.getElementById('group-info').innerHTML = `
        <div style="font-weight:500;">${currentGroup.name}</div>
        <div style="font-size:12px; color:#93ACB5; margin-top:4px;">초대코드: ${currentGroup.inviteCode} · 내 이름: ${currentGroup.displayName}</div>
      `;

      await loadPollData();
      render();
      await loadAvailData();
      renderAvail();
    })();
  </script>
</body>
</html>
